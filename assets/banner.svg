<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" font-family="Segoe UI, Ubuntu, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/><stop offset="1" stop-color="#101c33"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0.55"/>
    </linearGradient>
    <clipPath id="wf"><rect x="40" y="235" width="800" height="55"/></clipPath>
  </defs>
  <rect width="1200" height="300" rx="18" fill="url(#bg)"/>
  <g stroke="#1b2a44" stroke-width="1" opacity="0.4">
    <path d="M0 75 H1200 M0 150 H1200 M0 225 H1200"/>
    <path d="M150 0 V300 M300 0 V300 M450 0 V300 M600 0 V300 M750 0 V300 M900 0 V300 M1050 0 V300"/>
  </g>
  <g transform="translate(1000,150)">
    <circle r="105" fill="none" stroke="#1e3a5f"/><circle r="70" fill="none" stroke="#1e3a5f"/><circle r="35" fill="none" stroke="#1e3a5f"/>
    <line x1="-105" y1="0" x2="105" y2="0" stroke="#1e3a5f"/><line x1="0" y1="-105" x2="0" y2="105" stroke="#1e3a5f"/>
    <g>
      <path d="M0 0 L105 0 A105 105 0 0 0 74.2 -74.2 Z" fill="url(#beam)"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
    </g>
    <circle cx="45" cy="-38" r="4" fill="#22d3ee" opacity="0"><animate attributeName="opacity" values="0;1;0" dur="4s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="-60" cy="30" r="4" fill="#f59e0b" opacity="0"><animate attributeName="opacity" values="0;1;0" dur="4s" begin="2.4s" repeatCount="indefinite"/></circle>
  </g>
  <g opacity="0.55" clip-path="url(#wf)">
    <path d="M40 262 Q65 232 90 262 T140 262 T190 262 T240 262 T290 262 T340 262 T390 262 T440 262 T490 262 T540 262 T590 262 T640 262 T690 262 T740 262 T790 262 T840 262 T890 262 T940 262" fill="none" stroke="#22d3ee" stroke-width="2.5">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-100 0" dur="2.2s" repeatCount="indefinite"/>
    </path>
  </g>
  <text x="48" y="118" fill="#e5edf7" font-size="46" font-weight="700">Guillermo Aladro Abad</text>
  <text x="50" y="156" fill="#8fa6c7" font-size="19">Telecommunications Systems Engineering &#183; ETSIST-UPM</text>
  <text x="50" y="196" fill="#22d3ee" font-size="15" letter-spacing="3">RADIOCOMMUNICATIONS &#183; ANTENNAS &#183; SIGNAL PROCESSING &#183; RF</text>
</svg>
